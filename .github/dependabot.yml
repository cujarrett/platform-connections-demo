# https://docs.github.com/github/administering-a-repository/configuration-options-for-dependency-updates
# One update config per (ecosystem, directory) — Dependabot rejects duplicates.
# minor/patch are grouped into one PR; major updates arrive as separate PRs.

version: 2
updates:
  - package-ecosystem: "gomod"
    directory: "/api"
    schedule:
      interval: "daily"
    cooldown:
      default-days: 7
    groups:
      non-breaking:
        update-types:
          - "minor"
          - "patch"

  - package-ecosystem: "gomod"
    directory: "/caller"
    schedule:
      interval: "daily"
    cooldown:
      default-days: 7
    groups:
      non-breaking:
        update-types:
          - "minor"
          - "patch"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 7
    groups:
      actions:
        update-types:
          - "minor"
          - "patch"
