name: caller

on:
  push:
    branches: [main]
    paths:
      - 'caller/**'
  pull_request:
    paths:
      - 'caller/**'
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6.5.0
        with:
          go-version-file: caller/go.mod

      - name: Test
        working-directory: caller
        run: go test ./...

      - name: Lint
        working-directory: caller
        run: go vet ./...

  build-and-push:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: caller
          platforms: linux/arm64
          push: true
          tags: |
            ghcr.io/cujarrett/platform-connections-demo-caller:latest
            ghcr.io/cujarrett/platform-connections-demo-caller:sha-${{ github.sha }}
