name: caller

on:
  push:
    branches: [main]
    paths:
      - 'caller/**'
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: caller/go.mod

      - name: Test
        working-directory: caller
        run: go test -race ./...

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: caller
          platforms: linux/arm64
          push: true
          tags: |
            ghcr.io/cujarrett/caller:latest
            ghcr.io/cujarrett/caller:sha-${{ github.sha }}
